name: Submit Microsoft.PowerToys package to Windows Store

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:

  microsoft_store:
    name: Publish Microsoft Store
    runs-on: ubuntu-latest
    steps:
      # Shouldn't be needed once store-submission is public
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Get latest Version and URL from public releases
        id: releaseVars
        run: |
          echo ::set-output name=powerToysInstallerUrl::$(curl https://api.github.com/repos/Microsoft/PowerToys/releases | jq '[.[]|select(.name | contains("Release"))][0].assets' | jq '[.[]|select(.name | contains("PowerToysSetup"))][0].browser_download_url')

      - name: Configure Store Credentials
        uses: ./.github/store-submission/
        with:
          command: configure
          type: win32
          seller-id: ${{ secrets.SELLER_ID }}
          product-id: ${{ secrets.PRODUCT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}

      - name: Update draft submission
        uses: ./.github/store-submission/
        with:
          command: update
          product-update: '{
              "packages":[
                  {
                    "packageUrl":"${{ needs.releaseVars.outputs.powerToysInstallerUrl }}",
                    "languages":[
                        "en"
                    ],
                    "architectures":[
                        "X64"
                    ],
                    "isSilentInstall":true
                  }
              ]
            }'

      - name: Publish to Microsoft Store
        uses: ./.github/store-submission/
        with: 
          command: publish